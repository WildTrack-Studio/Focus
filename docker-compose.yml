version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: focus-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: focus_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - focus-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: focus-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/focus_db
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      JWT_REFRESH_SECRET: your-super-secret-refresh-key-change-this-in-production
      CORS_ORIGIN: http://localhost:8080
      NODE_ENV: production
    ports:
      - "4000:4000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - focus-network
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_ADMIN

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    container_name: focus-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NODE_ENV: production
    ports:
      - "8080:8080"
    depends_on:
      - backend
    networks:
      - focus-network

networks:
  focus-network:
    driver: bridge

volumes:
  postgres-data:
