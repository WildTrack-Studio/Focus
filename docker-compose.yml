version: '3.8'

services:
  # ==============================================
  # PostgreSQL Database
  # ==============================================
  postgres:
    image: postgres:15-alpine
    container_name: focus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-focus_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-focus_password}
      POSTGRES_DB: ${POSTGRES_DB:-focus_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - focus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-focus_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==============================================
  # Redis (Queue & Cache)
  # ==============================================
  redis:
    image: redis:7-alpine
    container_name: focus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - focus-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==============================================
  # MinIO (S3 Compatible Storage)
  # ==============================================
  minio:
    image: minio/minio:latest
    container_name: focus-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - focus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ==============================================
  # Backend API (NestJS)
  # ==============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: focus-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-focus_user}:${POSTGRES_PASSWORD:-focus_password}@postgres:5432/${POSTGRES_DB:-focus_db}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      ML_SERVICE_URL: http://ml-service:8000
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - focus-network

  # ==============================================
  # ML Service (FastAPI)
  # ==============================================
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: focus-ml-service
    restart: unless-stopped
    environment:
      ML_SERVICE_PORT: 8000
      ML_SERVICE_HOST: 0.0.0.0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "8000:8000"
    volumes:
      - ./ml-service:/app
      - ml-models:/app/weights
    depends_on:
      - redis
      - minio
    networks:
      - focus-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ==============================================
  # Frontend (Next.js)
  # ==============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: focus-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_ML_SERVICE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - focus-network

networks:
  focus-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
  ml-models:
